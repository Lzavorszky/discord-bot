  - id: pneumonia_pcr_influenza
    input: "Pneumonia PCR influenza"
    lang: en
    call: { tool: interpret_pcr, panel_id: biofire_pneumonia, organisms: ["influenza"] }
    expect: { route: pcr_panel, tool: interpret_pcr, protocol: biofire_pneumonia, output_has: ["oseltamivir"], output_not: ["not on panel"] }
    status: known_fail
    note: "F7 — influenza apparently not recognised on the panel. Confirm panel membership modelling."

  - id: mycoplasma_spectrum
    input: "Mycoplasma"
    lang: en
    route_input: true
    expect: { route: clarify, clarifies: true }
    status: known_fail
    note: "F8 — 'spectrum logic empty, why ceftriaxone?'. Bare organism with no panel -> ask panel/source, do not emit an unexplained recommendation."

  # ---- PCR resistance-marker rules (Phase 2.5; verbatim escalation) ----
  - id: pneumonia_pcr_ctxm_ertapenem
    input: "Pneumonia PCR E. coli CTX-M"
    lang: en
    call: { tool: interpret_pcr, panel_id: biofire_pneumonia, organisms: ["E. coli"], markers: ["CTX-M"] }
    expect: { route: pcr_panel, tool: interpret_pcr, protocol: biofire_pneumonia, output_has: ["ertapenem"] }
    status: new
    note: "PN: CTX-M ESBL marker escalates Enterobacterales backbone to ertapenem (Tier 3)."

  - id: jipcr_ctxm_meropenem
    input: "BioFire JI E. coli CTX-M"
    lang: en
    call: { tool: interpret_pcr, panel_id: biofire_joint_infection, organisms: ["E. coli"], markers: ["CTX-M"] }
