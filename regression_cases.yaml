  - id: tazobactam_ambiguous
    input: "Tazobactam dose"
    lang: en
    expect: { clarifies: true, tool: ask_clarification, output_has: ["piperacillin", "ceftolozane"] }
    status: known_fail
    note: "F1 — old bot silently picked ceftolozane/tazobactam. 'tazobactam' is ambiguous -> must ask which drug."

  # ---- Periop meds: prose path + alias-dump bug (F9) ----
  - id: asa_periop
