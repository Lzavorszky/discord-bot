    expect: { route: pcr_panel, tool: interpret_pcr, protocol: biofire_joint_infection, output_has: ["meropenem + colistin", "ID consultation"] }
    status: new
    note: "Carbapenemase -> Tier 4 meropenem + colistin + ID consult."

  - id: pneumonia_pcr_ctxm_not_strep
