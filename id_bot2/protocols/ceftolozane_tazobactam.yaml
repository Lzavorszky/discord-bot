# ceftolozane_tazobactam.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/ceftolozane_tazobactam.txt (v0.3).
# Two NORMAL tiers: NORMAL_GFR_GE_50 (9 g/day) and NORMAL_GFR_20_TO_50 (4.5 g/day).
# ANURIA_IHD distinct. CRRT = same as NORMAL_GFR_20_TO_50 dose but different rate.
# No STEP_UP.
# Hand-check: id_bot2/docs/ceftolozane_tazobactam_handcheck.md
id: ceftolozane_tazobactam
kind: drug_dose
source_label: uploaded antibiotic renal dosing DOCX - ceftolozane/tazobactam
canonical_name: ceftolozane/tazobactam
status: draft
version: 0.1

aliases:
  - ceftolozane/tazobactam
  - ceftolozane tazobactam
  - ceftolozane-tazobactam
  - zerbaxa
  - ceftolo tazo
  - ceftolozane/tazo

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  LOADING:           { dose: "2/1 g once",    when: "start of therapy",  admin: "start continuous infusion immediately", always_show: true }
  NORMAL_GFR_GE_50:  { dose: "9 g/day",       when: "GFR >=50",          admin: "1/0.5 g/50 mL, 12.5 mL/h" }
  NORMAL_GFR_20_50:  { dose: "4.5 g/day",     when: "GFR 20-50",         admin: "1/0.5 g/50 mL, 6.3 mL/h" }
  SEVERE_AKI:        { dose: "3 g/day",        when: "GFR <20",           admin: "1/0.5 g/50 mL, 4.2 mL/h" }
  ANURIA_IHD:        { dose: "1.5 g/day",      when: "anuria or IHD",     admin: "1/0.5 g/50 mL, 2.1 mL/h" }
  CRRT:              { dose: "4.5 g/day",      when: "CRRT",              admin: "1/0.5 g/50 mL, 12.5 mL/h" }

# Priority: ANURIA_IHD 100 > CRRT 95 > NORMAL_GFR_GE_50 80 > NORMAL_GFR_20_TO_50 70 > SEVERE_AKI 60
select:
  - { if: "ihd",                              tier: ANURIA_IHD }
  - { if: "crrt",                             tier: CRRT }
  - { if: "gfr >= 50",                        tier: NORMAL_GFR_GE_50 }
  - { if: "gfr >= 20 and gfr < 50",           tier: NORMAL_GFR_20_50 }
  - { if: "gfr < 20",                         tier: SEVERE_AKI }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers
  - alternative antibiotics, duration, or indication advice

footer: "Numeric GFR cutoffs follow this protocol table. Do not use doses outside this protocol."
