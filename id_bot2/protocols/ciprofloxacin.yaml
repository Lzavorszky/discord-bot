# ciprofloxacin.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/ciprofloxacin.txt (v0.1).
# Intermittent IV dosing. IHD distinct tier. No LOADING.
# NORMAL gfr>=60; GFR_30_TO_60; GFR_LT_30. IHD 100 > CRRT 95 > gfr tiers.
# Hand-check: id_bot2/docs/ciprofloxacin_handcheck.md
id: ciprofloxacin
kind: drug_dose
source_label: uploaded antibiotic renal dosing PDF
canonical_name: Ciprofloxacin
status: draft
version: 0.1

aliases:
  - ciprofloxacin
  - cipro
  - ciprofloxacin dose
  - ciprofloxacin dosing

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  NORMAL:       { dose: "3 x 400 mg IV or 2 x 500 mg PO", when: "GFR >=60" }
  GFR_30_TO_60: { dose: "2 x 400 mg IV",                   when: "GFR 30-60" }
  GFR_LT_30:    { dose: "1 x 400 mg IV",                   when: "GFR <30" }
  IHD:          { dose: "1 x 400 mg IV",                   when: "IHD" }
  CRRT:         { dose: "2 x 400 mg IV",                   when: "CRRT" }

# Source: IHD 100 > CRRT 95 > NORMAL 70 > GFR_30_TO_60 60 > GFR_LT_30 50
select:
  - { if: "ihd",                          tier: IHD }
  - { if: "crrt",                         tier: CRRT }
  - { if: "gfr >= 60",                    tier: NORMAL }
  - { if: "gfr >= 30 and gfr < 60",       tier: GFR_30_TO_60 }
  - { if: "gfr < 30",                     tier: GFR_LT_30 }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers

footer: "Use only the dose tiers listed in this protocol."
