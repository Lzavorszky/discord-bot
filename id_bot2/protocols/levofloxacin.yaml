# levofloxacin.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/levofloxacin.txt (v0.1).
# Intermittent IV dosing. IHD distinct tier. No LOADING.
# Four GFR tiers: >=50, 20-50, 10-20, <10. IHD = same dose as GFR_LT_10.
# Hand-check: id_bot2/docs/levofloxacin_handcheck.md
id: levofloxacin
kind: drug_dose
source_label: uploaded antibiotic renal dosing PDF
canonical_name: Levofloxacin
status: draft
version: 0.1

aliases:
  - levofloxacin
  - levofloxacin dose
  - levofloxacin dosing

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  NORMAL:       { dose: "2 x 750 mg",  when: "GFR >=50" }
  GFR_20_TO_50: { dose: "2 x 250 mg",  when: "GFR 20-50" }
  GFR_10_TO_20: { dose: "2 x 125 mg",  when: "GFR 10-20" }
  GFR_LT_10:    { dose: "1 x 125 mg",  when: "GFR <10" }
  IHD:          { dose: "1 x 125 mg",  when: "IHD" }
  CRRT:         { dose: "1 x 500 mg",  when: "CRRT" }

# Source: IHD 100 > CRRT 95 > NORMAL 80 > GFR_20_TO_50 70 > GFR_10_TO_20 60 > GFR_LT_10 50
select:
  - { if: "ihd",                           tier: IHD }
  - { if: "crrt",                          tier: CRRT }
  - { if: "gfr >= 50",                     tier: NORMAL }
  - { if: "gfr >= 20 and gfr < 50",        tier: GFR_20_TO_50 }
  - { if: "gfr >= 10 and gfr < 20",        tier: GFR_10_TO_20 }
  - { if: "gfr < 10",                      tier: GFR_LT_10 }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers

footer: "Use only the dose tiers listed in this protocol."
