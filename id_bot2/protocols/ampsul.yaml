# ampsul.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/ampsul.txt (v0.1).
# High-dose ampicillin/sulbactam for severe MACI/CRAB infection.
# LOADING always_show. CRRT and GFR>=60 share one tier (CRRT_OR_GFR_GE_60).
# IHD distinct. Dose format: sulbactam + ampicillin per source.
# Source GFR_LT_15 and IHD are separate selected outputs (IHD 100 wins if both).
# Hand-check: id_bot2/docs/ampsul_handcheck.md
id: ampsul
kind: drug_dose
source_label: ampicillin/sulbactam
canonical_name: ampicillin/sulbactam (high-dose)
status: draft
version: 0.1

aliases:
  - ampicillin/sulbactam
  - ampicillin sulbactam
  - ampicillin-sulbactam
  - amp sul
  - amp/sul
  - amp-sul
  - ampsul
  - high-dose sulbactam
  - sulbactam high-dose
  - CRAB protocol
  - MACI protocol
  - unasyn
  - unacid
  - sultamicillin

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  LOADING:           { dose: "sulbactam 1.5 g + ampicillin 3 g once",    when: "start of therapy, then start continuous infusion immediately", always_show: true }
  CRRT_OR_GFR_GE_60: { dose: "sulbactam 9 g/day + ampicillin 18 g/day",  when: "CRRT or GFR >=60",  admin: "continuous infusion; dissolve total daily dose in 250 mL NaCl 0.9%, 11 mL/h" }
  GFR_30_TO_60:      { dose: "sulbactam 6 g/day + ampicillin 12 g/day",  when: "GFR 30-60",          admin: "continuous infusion preferred" }
  GFR_15_TO_30:      { dose: "sulbactam 3 g/day + ampicillin 6 g/day",   when: "GFR 15-30",          admin: "continuous infusion preferred" }
  GFR_LT_15:         { dose: "sulbactam 2 g/day + ampicillin 4 g/day",   when: "GFR <15",            admin: "administer once daily; dilute in 100 mL NaCl 0.9%" }
  IHD:               { dose: "sulbactam 1.5 g/day + ampicillin 3 g/day", when: "IHD",                admin: "administer once daily after IHD (if scheduled); dilute in 100 mL NaCl 0.9%" }

# Source: IHD 100 > CRRT 95 (→ CRRT_OR_GFR_GE_60) > GFR_GE_60 80 (→ same) > GFR_30_60 70 > GFR_15_30 60 > GFR_LT_15 50
select:
  - { if: "ihd",                           tier: IHD }
  - { if: "crrt",                          tier: CRRT_OR_GFR_GE_60 }
  - { if: "gfr >= 60",                     tier: CRRT_OR_GFR_GE_60 }
  - { if: "gfr >= 30 and gfr < 60",        tier: GFR_30_TO_60 }
  - { if: "gfr >= 15 and gfr < 30",        tier: GFR_15_TO_30 }
  - { if: "gfr < 15",                      tier: GFR_LT_15 }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers
  - treatment advice for non-Acinetobacter infections from this protocol
  - monotherapy advice for severe MACI/CRAB infection

footer: "High-dose sulbactam for severe MACI/CRAB only. Requires: proven MACI infection, sulbactam inhibition zone >=11 mm, combination with a second active agent (e.g. colistin, tigecycline)."
