id: sbp
kind: pathway
canonical_name: spontaneous bacterial peritonitis
source_label: uploaded DOCX - SBP
status: draft
version: 0.1
answers_intents: [empiric_treatment, info]
aliases:
  - SBP
  - spontaneous bacterial peritonitis
  - spontan bakterialis peritonitis
  - "spontán bakteriális peritonitis"
  - ascites infection
  - ascites infekcio
