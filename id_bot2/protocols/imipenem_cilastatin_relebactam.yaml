# imipenem_cilastatin_relebactam.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/imipenem_cilastatin_relebactam.txt (v0.1).
# Intermittent IV bolus. LOADING always_show.
# 1.25 g = imipenem/cilastatin/relebactam 500/500/250 mg. Four GFR tiers.
# IHD: same dose as GFR_15_TO_30 (4 x 500 mg), but separate tier per source.
# CRRT: same dose as GFR_60_TO_90 (4 x 1 g), separate tier.
# Hand-check: id_bot2/docs/imipenem_cilastatin_relebactam_handcheck.md
id: imipenem_cilastatin_relebactam
kind: drug_dose
source_label: uploaded antibiotic renal dosing PDF
canonical_name: Imipenem/cilastatin/relebactam
status: draft
version: 0.1

aliases:
  - imipenem/cilastatin/relebactam
  - imipenem cilastatin relebactam
  - recarbrio
  - imipenem relebactam

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  LOADING:      { dose: "1.25 g once",     when: "start of therapy, then continue scheduled dosing", always_show: true }
  NORMAL:       { dose: "4 x 1.25 g",      when: "GFR >=90" }
  GFR_60_TO_90: { dose: "4 x 1 g",         when: "GFR 60-90" }
  GFR_30_TO_60: { dose: "4 x 0.75 g",      when: "GFR 30-60" }
  GFR_15_TO_30: { dose: "4 x 500 mg",      when: "GFR 15-30" }
  IHD:          { dose: "4 x 500 mg",      when: "IHD" }
  CRRT:         { dose: "4 x 1 g",         when: "CRRT" }

# Source: IHD 100 > CRRT 95 > NORMAL 80 > GFR_60_TO_90 70 > GFR_30_TO_60 60 > GFR_15_TO_30 50
select:
  - { if: "ihd",                           tier: IHD }
  - { if: "crrt",                          tier: CRRT }
  - { if: "gfr >= 90",                     tier: NORMAL }
  - { if: "gfr >= 60 and gfr < 90",        tier: GFR_60_TO_90 }
  - { if: "gfr >= 30 and gfr < 60",        tier: GFR_30_TO_60 }
  - { if: "gfr >= 15 and gfr < 30",        tier: GFR_15_TO_30 }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers

footer: "1.25 g = imipenem/cilastatin/relebactam 500/500/250 mg. Use only the dose tiers listed in this protocol."
