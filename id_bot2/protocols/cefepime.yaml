# cefepime.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/cefepime.txt (v0.3).
# CI: LOADING always_show. NORMAL gfr>=20; SEVERE_AKI gfr<20 or IHD; CRRT 3 g/day.
# STEP_UP (6 g/day) appears in DEFAULT_ANSWER table only — no selection rule in source.
# Reduced-dose prep for SEVERE_AKI noted in source DEFAULT_ANSWER (0.5 g/50 mL).
# Hand-check: id_bot2/docs/cefepime_handcheck.md
id: cefepime
kind: drug_dose
source_label: uploaded antibiotic renal dosing DOCX - cefepim
canonical_name: Cefepime
status: draft
version: 0.1

aliases:
  - cefepime
  - cefepim
  - cefepime dose
  - cefepim dose
  - cefepime dosing

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  LOADING:    { dose: "2 g once",    when: "start of therapy",   admin: "start continuous infusion immediately", always_show: true }
  NORMAL:     { dose: "4 g/day",     when: "GFR >=20",           admin: "2 g/50 mL, 4.2 mL/h" }
  SEVERE_AKI: { dose: "1 g/day",     when: "GFR <20 or IHD",     admin: "0.5 g/50 mL, 4.2 mL/h" }
  CRRT:       { dose: "3 g/day",     when: "CRRT",               admin: "2 g/50 mL, 3.2 mL/h" }
  STEP_UP:    { dose: "6 g/day",     when: "low levels",          admin: "2 g/50 mL, 6.4 mL/h" }

# STEP_UP has no selection rule in source — only shown in DEFAULT_ANSWER table.
select:
  - { if: "ihd",       tier: SEVERE_AKI }
  - { if: "crrt",      tier: CRRT }
  - { if: "gfr >= 20", tier: NORMAL }
  - { if: "gfr < 20",  tier: SEVERE_AKI }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers
  - alternative antibiotics, duration, or indication advice

prep: "Reduced-dose preparation (SEVERE_AKI / IHD): dissolve 1 g in 20 mL NaCl 0.9%, withdraw 10 mL, dilute to 50 mL → 0.5 g/50 mL syringe."

footer: "Numeric GFR cutoffs follow this protocol table. Do not use doses outside this protocol."
