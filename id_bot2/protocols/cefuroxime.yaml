# cefuroxime.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/cefuroxime.txt (v0.1).
# Bolus dosing (intermittent). IHD = distinct tier.
# LOADING bolus always_show. Source NORMAL guard: gfr > 20 (strict).
# Hand-check: id_bot2/docs/cefuroxime_handcheck.md
id: cefuroxime
kind: drug_dose
source_label: uploaded antibiotic renal dosing PDF
canonical_name: Cefuroxime
status: draft
version: 0.1

aliases:
  - cefuroxime
  - cefuroxim
  - cefuroxime dose
  - cefuroxime dosing

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  LOADING:
    dose: "1.5 g once"
    when: "start of therapy; then continue scheduled dosing"
    always_show: true
  NORMAL:
    dose: "4 x 1.5 g"
    when: "GFR >20"
  GFR_10_TO_20:
    dose: "2 x 1.5 g"
    when: "GFR 10-20"
  GFR_LT_10:
    dose: "1 x 1.5 g"
    when: "GFR <10"
  IHD:
    dose: "1 x 1.5 g"
    when: "IHD"
  CRRT:
    dose: "2 x 1.5 g"
    when: "CRRT"

# Source: IHD 100 > CRRT 95 > NORMAL (gfr>20) 70 > GFR_10_TO_20 60 > GFR_LT_10 50
select:
  - { if: "ihd",                       tier: IHD }
  - { if: "crrt",                      tier: CRRT }
  - { if: "gfr > 20",                  tier: NORMAL }
  - { if: "gfr >= 10 and gfr <= 20",   tier: GFR_10_TO_20 }
  - { if: "gfr < 10",                  tier: GFR_LT_10 }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers
  - alternative antibiotics, duration, or indication advice

footer: "Use only the dose tiers listed in this protocol."
