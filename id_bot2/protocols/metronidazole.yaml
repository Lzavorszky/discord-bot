# metronidazole.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/metronidazole.txt (v0.1).
# GFR <10 = do not use. IHD and CRRT = full dose.
# Hand-check: id_bot2/docs/metronidazole_handcheck.md
id: metronidazole
kind: drug_dose
source_label: uploaded antibiotic renal dosing PDF
canonical_name: Metronidazole
status: draft
version: 0.1

aliases:
  - metronidazole
  - metronidazol
  - metronidazole dose
  - metronidazole dosing

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:  { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt: { type: bool }
  ihd:  { type: bool }

tiers:
  NORMAL:    { dose: "3 x 500 mg", when: "GFR >=10" }
  GFR_LT_10: { dose: "do not use", when: "GFR <10" }
  IHD:       { dose: "3 x 500 mg", when: "IHD" }
  CRRT:      { dose: "3 x 500 mg", when: "CRRT" }

# Source SELECTION_RULES: IHD 100 > CRRT 95 > NORMAL (gfr>=10) 70 > GFR_LT_10 50 > DEFAULT 1
select:
  - { if: "ihd",       tier: IHD }
  - { if: "crrt",      tier: CRRT }
  - { if: "gfr >= 10", tier: NORMAL }
  - { if: "gfr < 10",  tier: GFR_LT_10 }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers

footer: "Use only the dose tiers listed in this protocol."
