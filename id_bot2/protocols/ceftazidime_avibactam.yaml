# ceftazidime_avibactam.yaml — kind: drug_dose
# Migrated from protocols/antibiotics/ceftazidime_avibactam.txt (v0.3).
# CI: LOADING always_show. ANURIA_IHD distinct (not merged into SEVERE_AKI).
# STEP_UP has selection rule (tdm_low_level, priority 110) — included in select.
# Hand-check: id_bot2/docs/ceftazidime_avibactam_handcheck.md
id: ceftazidime_avibactam
kind: drug_dose
source_label: uploaded antibiotic renal dosing DOCX - ceftazidim/avibactam
canonical_name: ceftazidime/avibactam
status: draft
version: 0.1

aliases:
  - ceftazidime/avibactam
  - ceftazidime avibactam
  - ceftazidime-avibactam
  - ceftazidim/avibactam
  - avycaz
  - zavicefta
  - ceftaz avi
  - caz avi

answers_intents: [dose]
refuses_intents: [coverage_question, targeted_treatment]

slots:
  gfr:           { type: number, unit: mL/min, min: 0, max: 250, on_out_of_range: ask_confirmation }
  crrt:          { type: bool }
  ihd:           { type: bool }
  tdm_low_level: { type: bool }

tiers:
  LOADING:    { dose: "2/0.5 g once",    when: "start of therapy",  admin: "start continuous infusion immediately", always_show: true }
  NORMAL:     { dose: "7.5 g/day",       when: "GFR >=20",          admin: "2/0.5 g/50 mL, 6.3 mL/h" }
  SEVERE_AKI: { dose: "2.5 g/day",       when: "GFR <20",           admin: "1/0.24 g/50 mL, 2.1 mL/h" }
  ANURIA_IHD: { dose: "1.25 g/day",      when: "anuria or IHD",     admin: "1/0.24 g/50 mL q48h, 2.1 mL/h" }
  CRRT:       { dose: "7.5 g/day",       when: "CRRT",              admin: "2/0.5 g/50 mL, 6.3 mL/h" }
  STEP_UP:    { dose: "10 g/day",        when: "low levels",         admin: "2/0.5 g/50 mL, 8.4 mL/h" }

# Priority: STEP_UP_LOW_LEVEL 110 > ANURIA_IHD 100 > CRRT 95 > NORMAL 70 > SEVERE_AKI 60
select:
  - { if: "tdm_low_level",  tier: STEP_UP }
  - { if: "ihd",            tier: ANURIA_IHD }
  - { if: "crrt",           tier: CRRT }
  - { if: "gfr >= 20",      tier: NORMAL }
  - { if: "gfr < 20",       tier: SEVERE_AKI }
  - { default: DEFAULT_ANSWER }

never:
  - dosing outside the listed tiers
  - Step-up dose unless low levels or low exposure/TDM context is explicitly present
  - alternative antibiotics, duration, or indication advice

prep: "Reduced-dose preparation (SEVERE_AKI / ANURIA_IHD): dissolve the 2.5 g ampoule in 20 mL NaCl 0.9%, withdraw 10 mL, dilute to 50 mL → 1/0.24 g/50 mL syringe."

footer: "Numeric GFR cutoffs follow this protocol table. Do not use doses outside this protocol."
