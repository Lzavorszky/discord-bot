# biofire_joint_infection.yaml — kind: pcr_panel
# Migrated VERBATIM from protocols/joint_infection_pcr.txt (source v0.2) +
# joint_infection_pcr.route_claims.json. Organism tiers / baseline therapies /
# selected-output answer strings / resistance rules are copied straight from the
# source SELECTED_OUTPUTS, PCR_ORGANISM_MAPPING and PCR_RESISTANCE_RULES.
# The engine (interpret_pcr) only ever SELECTS among the verbatim outputs below;
# it never composes a novel recommendation.
# Clinical hand-check vs source: id_bot2/docs/biofire_joint_infection_handcheck.md
# (Phase 2.5 — owner sign-off PENDING).
id: biofire_joint_infection
kind: pcr_panel
source_label: BioFire JI
canonical_name: BioFire Joint Infection Panel
status: draft
version: 0.2

# --- panel-level aliases (source ## ALIASES, verbatim) ---
aliases:
  - BioFire JI
  - BioFire joint infection
  - BioFire joint infection panel
  - joint infection panel
  - joint infection PCR
  - JI panel
  - JI PCR
  - FilmArray JI
  - JiPCR

answers_intents: [test_interpretation, panel_list]
refuses_intents: [dose]

# --- required input gate (source INPUT_SLOTS.required_for_selection) ---
requires:
  - at_least_one_detected_pathogen

# dosing is never emitted from the panel; it is forwarded to a drug_dose protocol
dose_via: drug_dose

# --- verbatim fixed outputs (source DEFAULT_ANSWER / OUTPUT_TEMPLATES) ---
default_answer: >-
  BioFire JI interpretation requires at least one detected pathogen.
  Resistance markers can only be interpreted together with detected pathogen(s).
  Send a result, for example: Staphylococcus aureus, Klebsiella pneumoniae group,
  Pseudomonas aeruginosa, Enterococcus faecium, E. coli + CTX-M.
default_answer_hu: >-
  BioFire JI interpretaciohoz kell legalabb egy detektalt korokozo.
  Rezisztencia marker csak detektalt korokozoval egyutt ertelmezheto.
  Kuldj egy eredmenyt, peldaul: Staphylococcus aureus, Klebsiella pneumoniae group,
  Pseudomonas aeruginosa, Enterococcus faecium, E. coli + CTX-M.
marker_without_pathogen: "Resistance markers can only be interpreted together with detected pathogen(s). Which pathogen was positive?"
marker_without_pathogen_hu: "Rezisztencia marker csak detektalt korokozoval egyutt ertelmezheto. Melyik korokozo volt pozitiv?"
conflict_answer: "Conflicting polymicrobial / resistance pattern - ID consultation recommended."

# --- spectrum hierarchy for polymicrobial escalation (source SELECTED_OUTPUTS
#     TIER_1..TIER_4, verbatim). Used only when >1 organism is detected. ---
spectrum_tiers:
  "1": { therapy: ceftriaxone, answer: "Tier 1 - ceftriaxone." }
  "2": { therapy: cefepime,    answer: "Tier 2 - cefepime." }
  "3": { therapy: meropenem,   answer: "Tier 3 - meropenem." }
  "4": { therapy: "meropenem + colistin", answer: "Tier 4 - meropenem + colistin. High MDR risk; ID consultation recommended." }

# --- bare-genus disambiguation (source CHECK_AMBIGUOUS_GENUS; F5) ---
disambiguate_genus:
  - genus: Klebsiella
    species: [Klebsiella pneumoniae group, Klebsiella oxytoca, Klebsiella aerogenes]

# --- resistance markers (source PCR_RESISTANCE_MARKER_ALIASES + PCR_RESISTANCE_RULES) ---
markers:
  - name: mecA/C & MREJ
    rule: mrsa
    therapy: vancomycin
    note: MRSA likely where applicable.
    aliases: [mecA/C, mecA/B, mecA, mecB, mecC, MREJ]
  - name: VanA/B
    rule: vre
    therapy: linezolid
    note: VRE likely where applicable.
    aliases: [VanA, VanB, VanA/B]
  - name: CTX-M
    rule: ctx_m
    therapy: meropenem
    answer: "Tier 3 - meropenem."
    note: ESBL marker; use meropenem in this protocol.
    aliases: [CTX-M, CTXM, ESBL]
  - name: carbapenemase
    rule: carbapenemase
    therapy: "meropenem + colistin"
    answer: "Tier 4 - meropenem + colistin. High MDR risk; ID consultation recommended."
    note: Carbapenemase marker; ID consultation recommended.
    aliases: [IMP, KPC, NDM, VIM, OXA-48-like, OXA-48, OXA48, carbapenemase]

# --- organisms: tier + baseline therapy + verbatim single-organism answer ---
#     (source PCR_ORGANISM_MAPPING + SELECTED_OUTPUTS, verbatim). ---
