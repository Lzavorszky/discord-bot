  # ---- anaerobes (all share the verbatim ANAEROBE_GUIDANCE output) ----
  - name: Anaerococcus prevotii/vaginalis
    entity_type: anaerobe
    tier: 1
    therapy: anaerobe guidance
    answer: "Anaerobe detected. If using cephalosporin therapy, add metronidazole. No additional anaerobe agent is needed with a penicillin derivative such as amoxicillin/clavulanate or piperacillin/tazobactam, or with a carbapenem such as imipenem or meropenem."
    answer_hu: "Anaerob korokozo detektalodott. Cefalosporin kezeles melle metronidazol kiegeszites szukseges. Penicillin szarmazek vagy karbapenem melle nem szukseges kiegeszites."
    aliases: [Anaerococcus prevotii/vaginalis, Anaerococcus prevotii, Anaerococcus vaginalis]
  - name: Clostridium perfringens
