# --- footer (source DEFAULT_FOOTER, verbatim) ---
footer: >-
  For skin-soft tissue infections safe to use this protocol as is. For nosocomial
  intra-abdominal infection, use JI PCR for regimen broadening only. Do not narrow
  below meropenem from PCR alone; wait for conventional culture and susceptibility.
