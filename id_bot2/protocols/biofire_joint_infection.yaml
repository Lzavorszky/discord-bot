  # ---- enterococci ----
  - name: Enterococcus faecalis
    entity_type: bacteria
    tier: 1
    therapy: ampicillin + vancomycin
    answer: "Enterococcus faecalis - ampicillin + vancomycin. Vancomycin can be de-escalated if the isolate is ampicillin-susceptible."
    answer_hu: "Enterococcus faecalis - ampicillin + vancomycin. Vancomycin deeszkalalhato, ha ampicillin-erzekeny a torzs."
    marker_answer: "Enterococcus faecalis + VanA/B - linezolid; baseline ampicillin + vancomycin context requires susceptibility review."
    marker_rules: ["VanA/B -> linezolid"]
    aliases: [Enterococcus faecalis, E. faecalis, E faecalis]
  - name: Enterococcus faecium
    entity_type: bacteria
    tier: 1
    therapy: linezolid
    answer: "Enterococcus faecium - linezolid."
    aliases: [Enterococcus faecium, E. faecium, E faecium]

  # ---- staphylococci ----
  - name: Staphylococcus aureus
    entity_type: bacteria
    tier: 1
    therapy: cefazolin
    answer: "Staphylococcus aureus without mecA/C, mecA/B, or MREJ - MSSA likely - cefazolin."
    marker_answer: "Staphylococcus aureus + mecA/C, mecA/B, or MREJ - MRSA likely - vancomycin."
    marker_rules: ["mecA/C, mecA/B, or MREJ -> vancomycin"]
    aliases: [Staphylococcus aureus, Staph aureus, S. aureus]
  - name: Staphylococcus lugdunensis
    entity_type: bacteria
