id: periop_gyogyszerek
kind: prose
canonical_name: perioperative medication management
source_label: Perioperative medications + antithrombotics
version: 0.2
status: draft
# Migrated VERBATIM from protocols/periop_gyogyszerek.txt (v0.2).
# Info-only, section-addressable: the addressable unit is the individual
# medication/class ENTRY (the source: "answer only that medication/class entry …
# Return only the short entry for the named drug or drug class. Do not list the
# whole protocol."). For antithrombotic entries the source insists the COMPLETE
# entry is returned (all timing rows), which is simply what each section text holds.
# No deterministic routing, risk/bridging/dose calculation is performed (source).
# default_answer = the source DEFAULT_QUESTION (asked when no drug/class is named).
# Some drugs appear in more than one source entry (e.g. selexipag in both the
# respiratory and antiplatelet entries; prazosin/doxazosin in cardiovascular and
# urology; sildenafil/tadalafil in respiratory and urology) — the router returns a
# clarify rather than silently picking one.
aliases:
  - perioperative medication management
  - perioperative medications
  - perioperative drugs
  - preoperative medications
  - surgery day medications
  - before surgery
  - prior to surgery
  - day of surgery
  - surgery day
  - perioperative
  - preoperative
  - medication before surgery
  - medication on surgery day
  - drug before surgery
  - drug on surgery day
  - mutet elott
  - mutet napjan
  - perioperativ
