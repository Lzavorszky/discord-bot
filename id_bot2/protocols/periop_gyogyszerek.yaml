  - veralvadasgatlo mutet elott
  - antikoagulans mutet elott
  - thrombocyta gatlo mutet elott
default_answer: "Which medication or medication class are you asking about perioperatively?"
no_match_answer: "This medication or class is not specified in the uploaded perioperative protocol."
sections:

  # --- cardiovascular ----------------------------------------------------- #
  beta_blockers:
    aliases: ["beta blockers", "beta-blockers", "beta blokkolok", "metoprolol", "bisoprolol", "atenolol", "carvedilol"]
    text_en: |
      Beta blockers; beta-blockers; beta blokkolok; metoprolol; bisoprolol; atenolol; carvedilol:
      Take/continue on surgery day. Source note: not recommended to stop; perioperative administration reduces perioperative myocardial ischemia. Starting perioperatively is questionable.
  calcium_channel_blockers:
    aliases: ["calcium channel blockers", "ca-channel blockers", "ca-csatorna blokkolok", "amlodipine", "verapamil", "diltiazem"]
    text_en: |
      Calcium channel blockers; Ca-channel blockers; Ca-csatorna blokkolok; amlodipine; verapamil; diltiazem:
      Take/continue on surgery day. Source note: DHP agents, verapamil and diltiazem included; verapamil has demonstrated cardioprotective effect.
  ace_inhibitors:
    aliases: ["ace inhibitors", "ace gatlok", "arb", "angiotensin receptor blockers"]
    text_en: |
      ACE inhibitors; ACE gatlok; ARB; angiotensin receptor blockers:
      Conditional. Continue in stable heart failure, monotherapy, or difficult-to-control blood pressure. Omit if not heart failure or if used in combination therapy. Source note: intraoperative hypotension risk may increase, but outcome difference not shown.
  alpha2_agonists:
    aliases: ["alpha-2 agonists", "alfa2 agonistak", "moxonidine", "clonidine", "dexmedetomidine"]
    text_en: |
      Alpha-2 agonists; alfa2 agonistak; moxonidine; clonidine; dexmedetomidine:
      Take/continue on surgery day. Source note: analgesic effect, reduced stress response, reduced perioperative cardiac events.
  alpha1_blockers:
    aliases: ["alpha-1 blockers", "alfa1 blokkolok", "prazosin", "doxazosin"]
    text_en: |
      Alpha-1 blockers; alfa1 blokkolok; prazosin; doxazosin:
      Take/continue on surgery day. Exception: cataract surgery requires discussion with the surgeon.
  nitrates:
    aliases: ["nitrates", "nitratok"]
    text_en: |
      Nitrates; nitratok:
      Conditional. Omit for high-risk surgery.
  diuretics:
    aliases: ["diuretics", "diuretikumok", "furosemide", "hydrochlorothiazide", "spironolactone"]
    text_en: |
      Diuretics; diuretikumok; furosemide; hydrochlorothiazide; spironolactone:
      Conditional, mostly omit because of hypokalemia and hypovolemia risk. Continue if non-compensated heart failure and the patient was already receiving it.
  amiodarone:
    aliases: ["amiodarone", "amiodaron"]
    text_en: |
      Amiodarone; amiodaron:
      Take/continue on surgery day. Source note: given for arrhythmia prevention.
  digoxin:
    aliases: ["digoxin"]
    text_en: |
      Digoxin:
      Take/continue on surgery day. Source note: check level if toxicity suspected.
  trimetazidine:
    aliases: ["trimetazidine", "trimetazidin"]
    text_en: |
      Trimetazidine; trimetazidin:
      Take/continue on surgery day. Source note: exact certainty unclear, but source favors giving.
  statins:
    aliases: ["statins", "statinok"]
    text_en: |
      Statins; statinok:
      Take/continue on surgery day. Source note: plaque-stabilizing effect reduces cardiovascular risk.

  # --- respiratory -------------------------------------------------------- #
  inhaled_anticholinergics:
    aliases: ["inhaled anticholinergics", "inhalacios antikolinerg", "ipratropium", "tiotropium", "aclidinium", "umeclidinium", "revefenacin", "glycopyrrolate"]
    text_en: |
      Inhaled anticholinergics; inhalacios antikolinerg; ipratropium; tiotropium; aclidinium; umeclidinium; revefenacin; glycopyrrolate:
      Take/continue on surgery day.
  antifibrotics:
    aliases: ["antifibrotics", "fibrosis elleni gyogyszerek", "nintedanib", "pirfenidone"]
    text_en: |
      Antifibrotics; fibrosis elleni gyogyszerek; nintedanib; pirfenidone:
      Take/continue on surgery day.
  arylalkylamine_nasal_drops:
    aliases: ["arylalkylamine nasal drops", "arylalkylamine orrcsepp", "phenylephrine", "pseudoephedrine"]
    text_en: |
      Arylalkylamine nasal drops; arylalkylamine orrcsepp; phenylephrine; pseudoephedrine:
      Take/continue on surgery day.
  inhaled_beta2_agonists:
    aliases: ["inhaled beta-2 agonists", "inhalacios beta2 agonistak", "albuterol", "levalbuterol", "salmeterol", "formoterol", "indacaterol", "olodaterol", "vilanterol"]
    text_en: |
      Inhaled beta-2 agonists; inhalacios beta2 agonistak; albuterol; levalbuterol; salmeterol; formoterol; indacaterol; olodaterol; vilanterol:
      Take/continue on surgery day.
  inhaled_corticosteroids:
    aliases: ["inhaled corticosteroids", "inhalacios kortikoszteroidok", "fluticasone", "budesonide", "mometasone", "beclomethasone"]
    text_en: |
      Inhaled corticosteroids; inhalacios kortikoszteroidok; fluticasone; budesonide; mometasone; beclomethasone:
      Take/continue on surgery day. This entry is only for inhaled corticosteroids; systemic steroid stress-dose guidance belongs to the separate perioperative steroid guide.
  endothelin_receptor_antagonists:
    aliases: ["endothelin receptor antagonists", "endothelin-r antagonistak", "bosentan", "macitentan", "ambrisentan"]
    text_en: |
      Endothelin receptor antagonists; endothelin-R antagonistak; bosentan; macitentan; ambrisentan:
      Take/continue on surgery day. Source note: interruption can cause rebound pulmonary hypertension; many interactions; edema and anemia possible; preoperative renal and liver function needed.
  h1_antihistamines:
    aliases: ["h1 antihistamines", "h1 antihisztaminok", "hydroxyzine", "dimenhydrinate", "cetirizine", "diphenhydramine", "loratadine", "levocetirizine", "fexofenadine", "desloratadine"]
    text_en: |
      H1 antihistamines; H1 antihisztaminok; hydroxyzine; dimenhydrinate; cetirizine; diphenhydramine; loratadine; levocetirizine; fexofenadine; desloratadine:
      Take/continue on surgery day.
  leukotriene_inhibitors:
    aliases: ["leukotriene inhibitors", "leukotrien gatlok", "montelukast", "zafirlukast", "zileuton"]
    text_en: |
      Leukotriene inhibitors; leukotrien gatlok; montelukast; zafirlukast; zileuton:
      Take/continue on surgery day. Source note: toxicity risk with amiodarone, clarithromycin, or fluconazole.
  n_acetylcysteine:
    aliases: ["n-acetylcysteine", "nac", "acetylcysteine"]
    text_en: |
      N-acetylcysteine; NAC; acetylcysteine:
      Take/continue on surgery day. Source note: with nitroglycerin, hypotension and headache may occur.
  theophylline:
    aliases: ["theophylline", "teofillin"]
    text_en: |
      Theophylline; teofillin:
      Take/continue on surgery day, with attention to interactions and adverse effects. Source note: may reduce effects of benzodiazepines and pancuronium.
  selexipag_respiratory:
    aliases: ["selexipag"]
    text_en: |
      Selexipag:
      Take/continue on surgery day. Source note: bleeding risk.
  pde4_inhibitors:
    aliases: ["pde4 inhibitors", "pde4 gatlok", "roflumilast"]
    text_en: |
      PDE4 inhibitors; PDE4 gatlok; roflumilast:
      Take/continue on surgery day. Source note: toxicity risk with erythromycin, clarithromycin, fluconazole, or cimetidine.
  pde5_inhibitors_respiratory:
    aliases: ["pde5 inhibitors", "pde5 gatlok", "sildenafil", "tadalafil"]
    text_en: |
      PDE5 inhibitors; PDE5 gatlok; sildenafil; tadalafil:
      Conditional. If used for urologic indication, omit 3 days before surgery. If used for pulmonary hypertension, continue. Source note: with erythromycin, azithromycin, ciprofloxacin, or azoles, hypotension, headache, and visual disturbance may occur.
  prostacyclin_analogues:
    aliases: ["prostacyclin analogues", "prosztaciklin analogok", "epoprostenol", "treprostinil", "iloprost"]
    text_en: |
      Prostacyclin analogues; prosztaciklin analogok; epoprostenol; treprostinil; iloprost:
      Take/continue on surgery day. Source note: interruption can cause rebound pulmonary hypertension; bleeding risk due to antiplatelet effect.
  riociguat:
    aliases: ["riociguat", "adempas"]
    text_en: |
      Riociguat; Adempas:
      Take/continue on surgery day. Source note: nitrates are contraindicated because of hypotension; with clarithromycin or itraconazole there is hypotension and bleeding risk.

  # --- endocrine (non-steroid) -------------------------------------------- #
  bisphosphonates:
    aliases: ["bisphosphonates", "biszfoszfonatok"]
    text_en: |
      Bisphosphonates; biszfoszfonatok:
      Conditional. Omit 3 months before bone-involving surgery. Source note: may cause bone necrosis and impair bone healing.
  levothyroxine:
    aliases: ["levothyroxine", "l-thyroxin", "thyroxine"]
    text_en: |
      Levothyroxine; L-thyroxin; thyroxine:
      Take/continue on surgery day. Source note: thyroid panel should be available within 6 months.
  thiamazole:
    aliases: ["thiamazole", "thiamazol", "metothyrin"]
    text_en: |
      Thiamazole; thiamazol; Metothyrin:
      Take/continue on surgery day.
  other_endocrine:
    aliases: ["other endocrine medications"]
    text_en: |
      Other endocrine medications:
      Antidiabetics are covered in the antidiabetic entries in this protocol. Steroid perioperative supplementation belongs to the separate perioperative steroid guide.

  # --- CNS / pain --------------------------------------------------------- #
  anticonvulsants:
    aliases: ["anticonvulsants", "anticonvulsivumok", "antiepileptics"]
    text_en: |
      Anticonvulsants; anticonvulsivumok; antiepileptics:
      Take/continue on surgery day.
  parkinson_medications:
    aliases: ["parkinson medications", "parkinson szerek", "biperiden", "procyclidine", "rasagiline", "pramipexole", "entacapone", "apomorphine", "levodopa", "carbidopa", "benserazide", "amantadine", "ropinirole", "safinamide"]
    text_en: |
      Parkinson medications; Parkinson szerek; biperiden; procyclidine; rasagiline; pramipexole; entacapone; apomorphine; levodopa; carbidopa; benserazide; amantadine; ropinirole; safinamide:
      Take/continue on surgery day.
  alzheimer_medications:
    aliases: ["alzheimer medications", "alzheimer szerek", "donepezil", "ginkgo biloba", "rivastigmine", "memantine"]
    text_en: |
      Alzheimer medications; Alzheimer szerek; donepezil; ginkgo biloba; rivastigmine; memantine:
      Take/continue on surgery day.
  barbiturates:
    aliases: ["barbiturates", "barbituratok", "phenobarbital", "butalbital"]
    text_en: |
      Barbiturates; barbituratok; phenobarbital; butalbital:
      Take/continue on surgery day.
  triptans:
    aliases: ["triptans", "triptanok", "almotriptan", "eletriptan", "frovatriptan", "naratriptan", "rizatriptan", "sumatriptan", "zolmitriptan"]
    text_en: |
      Triptans; triptanok; almotriptan; eletriptan; frovatriptan; naratriptan; rizatriptan; sumatriptan; zolmitriptan:
      Omit on surgery day. Source note: serotonin syndrome risk with other serotonergic drugs.
  cgrp_mabs:
    aliases: ["cgrp receptor monoclonal antibodies", "cgrp-r monoclonalis antitestek", "erenumab", "fremanezumab", "galcanezumab", "rimegepant"]
    text_en: |
      CGRP receptor monoclonal antibodies; CGRP-R monoclonalis antitestek; erenumab; fremanezumab; galcanezumab; rimegepant:
      Take/continue on surgery day.
  spasmolytics:
    aliases: ["spasmolytics", "spasmolyticumok", "baclofen", "gablofen", "tizanidine"]
    text_en: |
      Spasmolytics; spasmolyticumok; baclofen; gablofen; tizanidine:
      Take/continue on surgery day. Source note: omission may cause withdrawal syndrome.
  central_muscle_relaxants:
    aliases: ["central muscle relaxants", "centralis izomrelaxansok", "methocarbamol", "orphenadrine", "tolperisone"]
    text_en: |
      Central muscle relaxants; centralis izomrelaxansok; methocarbamol; orphenadrine; tolperisone:
      Omit on surgery day. Source note: potentiates sedatives and anesthetics; orphenadrine has anticholinergic adverse effects.
  anxiolytics:
    aliases: ["anxiolytics", "anxiolitikumok"]
    text_en: |
      Anxiolytics; anxiolitikumok:
      Take/continue on surgery day. Source note: additive CNS depressant effect.
  antidepressants:
    aliases: ["antidepressants", "antidepresszansok"]
    text_en: |
      Antidepressants; antidepresszansok:
      Take/continue on surgery day, except where the source has a separate exception. Source note: QT prolongation, serotonin syndrome risk, elevated blood pressure, and additive CNS depression.
  mao_inhibitors:
    aliases: ["mao inhibitors", "mao gatlok", "moclobemide", "selegiline", "phenelzine"]
    text_en: |
      MAO inhibitors; MAO gatlok; moclobemide; selegiline; phenelzine; rasagiline; safinamide:
      Warning. Source states absolute contraindication during anesthesia with ephedrine, meperidine, methadone, or tramadol.
  lithium:
    aliases: ["lithium", "litium"]
    text_en: |
      Lithium; litium:
      Conditional. For surgery with major fluid shifts, omission 72 hours preoperatively may arise. Source note: many interactions; lithium toxicity risk in large fluid-shift operations; renal function, ions, TSH, and ECG needed.
  antipsychotics:
    aliases: ["antipsychotics", "antipszichotikumok"]
    text_en: |
      Antipsychotics; antipszichotikumok:
      Take/continue on surgery day. Source note: QT prolongation and additive CNS depression.
  adhd_medications:
    aliases: ["adhd medications", "adhd szerek", "methylphenidate", "atomoxetine"]
    text_en: |
      ADHD medications; ADHD szerek; methylphenidate; atomoxetine:
      Omit on surgery day.
  paracetamol:
    aliases: ["paracetamol", "acetaminophen"]
    text_en: |
      Paracetamol; acetaminophen:
      Take/continue on surgery day. Source note: decide whether it may be used for premedication.
  nsaids:
    aliases: ["nsaids", "nsaid-ok", "ibuprofen", "diclofenac", "naproxen", "coxibs", "cox-2 inhibitors"]
    text_en: |
      NSAIDs; NSAID-ok; ibuprofen; diclofenac; naproxen; coxibs; COX-2 inhibitors:
      Conditional. Decide whether it can be used as premedication. Source note: renal function needed; nonselective NSAIDs have bleeding risk; COX-2 inhibitors have higher thromboembolic risk.
  opioid_agonists:
    aliases: ["opioid agonists", "opioid agonistak", "codeine", "fentanyl", "hydrocodone", "hydromorphone", "levorphanol", "methadone", "morphine", "oxycodone", "sufentanil", "tramadol", "meperidine"]
    text_en: |
      Opioid agonists; opioid agonistak; codeine; fentanyl; hydrocodone; hydromorphone; levorphanol; methadone; morphine; oxycodone; sufentanil; tramadol; meperidine:
      Warning. Source flags contraindication if eGFR <30 for morphine, meperidine, and tramadol.
  opioid_antagonists:
    aliases: ["opioid antagonists", "opioid antagonistak", "alvimopan", "methylnaltrexone", "naldemedine", "naloxegol", "naloxone", "naltrexone"]
    text_en: |
      Opioid antagonists; opioid antagonistak; alvimopan; methylnaltrexone; naldemedine; naloxegol; naloxone; naltrexone:
      Omit on surgery day.
  mixed_opioid_agonist_antagonists:
    aliases: ["mixed opioid agonist-antagonists", "opioid kevert agonista antagonistak", "buprenorphine", "butorphanol", "nalbuphine", "pentazocine"]
    text_en: |
      Mixed opioid agonist-antagonists; opioid kevert agonista antagonistak; buprenorphine; butorphanol; nalbuphine; pentazocine:
      Warning. Source note: more opioid may be needed; QT prolongation.
  ergotamine:
    aliases: ["ergotamine", "ergotamin"]
    text_en: |
      Ergotamine; ergotamin:
      Omit 2 days before surgery.

  # --- urology ------------------------------------------------------------ #
  five_alpha_reductase_inhibitors:
    aliases: ["5-alpha-reductase inhibitors", "5alfa reduktaz gatlok", "dutasteride", "finasteride"]
    text_en: |
      5-alpha-reductase inhibitors; 5alfa reduktaz gatlok; dutasteride; finasteride:
      Take/continue on surgery day.
  alpha1_antagonists_urology:
    aliases: ["alpha-1 antagonists", "alfa1 antagonistak", "alfuzosin", "silodosin", "tamsulosin", "terazosin", "doxazosin", "prazosin"]
    text_en: |
      Alpha-1 antagonists; alfa1 antagonistak; alfuzosin; silodosin; tamsulosin; terazosin; doxazosin; prazosin:
      Take/continue on surgery day. Source note: cataract surgery requires discussion with surgeon.
  bladder_anticholinergics:
    aliases: ["bladder anticholinergics", "holyag antikolinerg", "darifenacin", "fesoterodine", "oxybutynin", "solifenacin", "tolterodine", "trospium"]
    text_en: |
      Bladder anticholinergics; holyag antikolinerg; darifenacin; fesoterodine; oxybutynin; solifenacin; tolterodine; trospium:
      Omit on surgery day.
  urologic_oncology_agents:
    aliases: ["urologic oncology agents", "urologiai daganatellenes szerek", "abiraterone", "apalutamide", "bicalutamide", "degarelix", "enzalutamide", "goserelin", "leuprolide", "nilutamide"]
    text_en: |
      Urologic oncology agents; urologiai daganatellenes szerek; abiraterone; apalutamide; bicalutamide; degarelix; enzalutamide; goserelin; leuprolide; nilutamide:
      Take/continue on surgery day.
  bethanechol:
    aliases: ["bethanechol", "myocholine"]
    text_en: |
      Bethanechol; Myocholine:
      Omit on surgery day.
  mirabegron:
    aliases: ["mirabegron", "betmiga"]
    text_en: |
      Mirabegron; Betmiga:
      Omit on surgery day.
  pde5_inhibitors_urology:
    aliases: ["pde5 inhibitors for urologic indication", "avanafil", "vardenafil", "sildenafil", "tadalafil"]
    text_en: |
      PDE5 inhibitors for urologic indication; avanafil; sildenafil; tadalafil; vardenafil:
      Conditional. If used for urologic indication, omit 3 days before surgery. If used for pulmonary hypertension, continue.

  # --- immunomodulators --------------------------------------------------- #
  interferons:
    aliases: ["interferons", "interferonok", "beta-1a", "beta-1b", "interferon alfa", "peginterferon", "ropeginterferon"]
    text_en: |
      Interferons; interferonok; beta-1a; beta-1b; interferon alfa; peginterferon; ropeginterferon:
      Take/continue on surgery day. Source note: extended preoperative lab needed because of thrombocytopenia and leukopenia risk: blood count, TSH, liver function, and ECG.
  glatiramer:
    aliases: ["glatiramer", "remurel"]
    text_en: |
      Glatiramer; Remurel:
      Take/continue on surgery day. Source note: liver function needed.
  monoclonal_immunomodulators:
    aliases: ["monoclonal antibodies and related immunomodulators", "monoclonalis antitestek", "natalizumab", "alemtuzumab", "ocrelizumab", "rituximab", "ofatumumab", "eculizumab", "tofacitinib", "ustekinumab", "ozanimod", "vedolizumab"]
    text_en: |
      Monoclonal antibodies and related immunomodulators; monoclonalis antitestek; natalizumab; alemtuzumab; ocrelizumab; rituximab; ofatumumab; eculizumab; tofacitinib; ustekinumab; ozanimod; vedolizumab:
      Omit 1 day before surgery. Source note: infection risk.
  fumarates:
    aliases: ["fumarates", "fumaratok", "dimethyl fumarate", "diroximel fumarate"]
    text_en: |
      Fumarates; fumaratok; dimethyl fumarate; diroximel fumarate:
      Take/continue on surgery day. Source note: blood count and liver function needed because of leukopenia risk.
  dalfampridine:
    aliases: ["dalfampridine", "fampyra"]
    text_en: |
      Dalfampridine; Fampyra:
      Take/continue on surgery day. Source note: renal function needed.
  teriflunomide:
    aliases: ["teriflunomide", "teriflunomid"]
    text_en: |
      Teriflunomide; teriflunomid:
      Take/continue on surgery day. Source note: blood count and liver function needed because of thrombocytopenia and leukopenia risk.
  s1p_receptor_modulators:
    aliases: ["s1p receptor modulators", "fingolimod", "siponimod", "ponesimod"]
    text_en: |
      S1P receptor modulators; fingolimod; siponimod; ozanimod; ponesimod:
      Take/continue on surgery day. Source note: QT prolongation; with beta blockers or calcium channel blockers there is high-grade AV block risk; blood count, liver function, and ECG needed.
  cladribine:
    aliases: ["cladribine", "mavenclad"]
    text_en: |
      Cladribine; Mavenclad:
      Omit on surgery day. Source note: myocarditis, opportunistic infection risk; blood count, liver function, and ECG needed.
  mitoxantrone:
    aliases: ["mitoxantrone", "novantrone"]
    text_en: |
      Mitoxantrone; Novantrone:
      Omit on surgery day. Source note: cardiotoxicity, leukopenia, infection risk; blood count, renal and liver function, and ECG needed.
  acetylcholinesterase_inhibitors:
    aliases: ["acetylcholinesterase inhibitors", "acetilkolineszteraz gatlok", "neostigmine", "pyridostigmine", "mestinon"]
    text_en: |
      Acetylcholinesterase inhibitors; acetilkolineszteraz gatlok; neostigmine; pyridostigmine; Mestinon:
      Take/continue on surgery day. Source note: unpredictable muscle relaxant duration and bradycardia tendency.
  azathioprine:
    aliases: ["azathioprine", "azathioprin", "imuran"]
    text_en: |
      Azathioprine; azathioprin; Imuran:
      Take/continue on surgery day. Source note: blood count and liver function needed.
  mycophenolate:
    aliases: ["mycophenolate", "mikofenolat", "cellcept"]
    text_en: |
      Mycophenolate; mikofenolat; Cellcept:
      Take/continue on surgery day. Source note: blood count needed.
  cyclosporine:
    aliases: ["cyclosporine", "ciclosporin", "cyclosporin", "sandimmun"]
    text_en: |
      Cyclosporine; ciclosporin; cyclosporin; Sandimmun:
      Take/continue on surgery day. Source note: interaction with opioids, benzodiazepines, and muscle relaxants; blood count, renal function, liver function, and ions needed.
  tacrolimus:
    aliases: ["tacrolimus", "prograf"]
    text_en: |
      Tacrolimus; Prograf:
      Take/continue on surgery day. Source note: hyperkalemia and QT prolongation; blood count, renal function, liver function, and ECG needed.
  methotrexate:
    aliases: ["methotrexate", "methotrexat"]
    text_en: |
      Methotrexate; methotrexat:
      Take/continue on surgery day. Source note: bone marrow depression, infection risk; blood count and liver function needed.
  tnf_inhibitors:
    aliases: ["tnf inhibitors", "tnf gatlok", "infliximab", "adalimumab", "golimumab", "certolizumab"]
    text_en: |
      TNF inhibitors; TNF gatlok; infliximab; adalimumab; golimumab; certolizumab:
      Omit 1 preoperative dose.

  # --- gastrointestinal --------------------------------------------------- #
  five_asa:
    aliases: ["5-aminosalicylic acid", "5-asa", "mesalazine", "olsalazine", "sulfasalazine"]
    text_en: |
      5-aminosalicylic acid; 5-ASA; mesalazine; olsalazine; sulfasalazine:
      Take/continue on surgery day. Source note: blood count and renal function.
  five_ht3_antagonists:
    aliases: ["5-ht3 antagonists", "ondansetron", "granisetron", "dolasetron", "palonosetron"]
    text_en: |
      5-HT3 antagonists; ondansetron; granisetron; dolasetron; palonosetron:
      Take/continue on surgery day. Source note: QT prolongation; serotonin syndrome risk with serotonergic drugs.
  antacids:
    aliases: ["antacids", "antacidok", "sodium citrate", "magnesium citrate", "aluminium hydroxide", "magnesium hydroxide", "hydrotalcite", "calcium carbonate", "magnesium carbonate", "sucralfate"]
    text_en: |
      Antacids; antacidok; sodium citrate; magnesium citrate; aluminium hydroxide; magnesium hydroxide; hydrotalcite; calcium carbonate; magnesium carbonate; sucralfate:
      Omit on surgery day.
  gi_anticholinergics:
    aliases: ["gi anticholinergics", "hyoscine", "buscopan"]
    text_en: |
      GI anticholinergics; hyoscine; Buscopan:
      Omit on surgery day.
  anti_hbv:
    aliases: ["anti-hbv reverse transcriptase inhibitors", "entecavir", "tenofovir", "lamivudine", "adefovir"]
    text_en: |
      Anti-HBV reverse transcriptase inhibitors; entecavir; tenofovir; lamivudine; adefovir:
      Omit on surgery day. Source note: renal and liver function needed.
  aprepitant:
    aliases: ["aprepitant", "emend"]
    text_en: |
      Aprepitant; Emend:
      Take/continue on surgery day. Source note: with opioids or benzodiazepines, respiratory depression toxicity risk.
  bupropion_naltrexone:
    aliases: ["bupropion/naltrexone", "bupropion naltrexone", "mysimba"]
    text_en: |
      Bupropion/naltrexone; Mysimba:
      Omit on surgery day.
  hepatitis_c_treatment:
    aliases: ["hepatitis c treatment", "hcv treatment", "dasabuvir", "ombitasvir", "paritaprevir", "ritonavir", "ledipasvir", "voxilaprevir", "velpatasvir", "sofosbuvir", "ribavirin", "elbasvir", "grazoprevir", "glecaprevir", "pibrentasvir"]
    text_en: |
      Hepatitis C treatment; HCV treatment; dasabuvir; ombitasvir; paritaprevir; ritonavir; ledipasvir; voxilaprevir; velpatasvir; sofosbuvir; ribavirin; elbasvir; grazoprevir; glecaprevir; pibrentasvir:
      Omit on surgery day.
  dopamine_antagonists:
    aliases: ["dopamine antagonists", "dopamin antagonistak", "promethazine", "prochlorperazine", "droperidol", "metoclopramide"]
    text_en: |
      Dopamine antagonists; dopamin antagonistak; promethazine; prochlorperazine; droperidol; metoclopramide:
      Take/continue on surgery day. Source note: QT prolongation; avoid in COPD/OSAS and Parkinson disease.
  gallstone_dissolving_agents:
    aliases: ["gallstone dissolving agents", "epeko oldo anyagok", "ursodeoxycholic acid", "dehydrocholic acid", "chenodeoxycholic acid", "obeticholic acid"]
    text_en: |
      Gallstone dissolving agents; epeko oldo anyagok; ursodeoxycholic acid; dehydrocholic acid; chenodeoxycholic acid; obeticholic acid:
      Omit on surgery day.
  guanylate_cyclase_c_agonists:
    aliases: ["guanylate cyclase c agonists", "linaclotide", "plecanatide"]
    text_en: |
      Guanylate cyclase C agonists; linaclotide; plecanatide:
      Take/continue on surgery day.
  h2_antagonists:
    aliases: ["h2 antagonists", "ranitidine", "famotidine"]
    text_en: |
      H2 antagonists; ranitidine; famotidine:
      Take/continue on surgery day. Source note: delirium risk in older patients; famotidine can cause QT prolongation, ECG needed.
  laxatives:
    aliases: ["laxatives", "laxativumok", "sennoside", "peg 3350", "bisacodyl", "lactulose", "docusate"]
    text_en: |
      Laxatives; laxativumok; sennoside; PEG 3350; bisacodyl; magnesium hydroxide; magnesium citrate; lactulose; docusate:
      Omit on surgery day. Source note: bradycardia risk with amiodarone.
  lisdexamfetamine:
    aliases: ["lisdexamfetamine", "elvanse"]
    text_en: |
      Lisdexamfetamine; Elvanse:
      Omit 3 days before surgery. Source note: serotonin syndrome risk.
  lubiprostone:
    aliases: ["lubiprostone", "amitiza"]
    text_en: |
      Lubiprostone; Amitiza:
      Take/continue on surgery day.
  orlistat:
    aliases: ["orlistat", "alli", "xenical"]
    text_en: |
      Orlistat; Alli; Xenical:
      Omit on surgery day.
  pancreatic_enzymes:
    aliases: ["pancreatic enzymes", "pancreas enzymes", "kreon", "dipankrin", "pangrol"]
    text_en: |
      Pancreatic enzymes; pancreas enzymes; Kreon; Dipankrin; Pangrol:
      Omit on surgery day.
  phentermine_topiramate:
    aliases: ["phentermine/topiramate", "phentermine topiramate", "qsiva"]
    text_en: |
      Phentermine/topiramate; Qsiva:
      Omit on surgery day. Source note: preoperative bicarbonate, potassium, creatinine, and glucose needed.
  ppi:
    aliases: ["ppi", "proton pump inhibitors", "pantoprazole", "omeprazole", "lansoprazole", "esomeprazole"]
    text_en: |
      PPI; proton pump inhibitors; pantoprazole; omeprazole; lansoprazole; esomeprazole:
      Take/continue on surgery day.
  serotonergic_neuroenteric_modulators:
    aliases: ["serotonergic neuroenteric modulators", "tegaserod", "alosetron", "prucalopride"]
    text_en: |
      Serotonergic neuroenteric modulators; tegaserod; alosetron; prucalopride:
      Take/continue on surgery day.
  stool_binders:
    aliases: ["stool binders", "szekletkotok", "loperamide", "diphenoxylate"]
    text_en: |
      Stool binders; szekletkotok; loperamide; diphenoxylate:
      Conditional in source table.

  # --- insulin & glucose -------------------------------------------------- #
  perioperative_glucose_target:
    aliases: ["perioperative glucose target", "glucose target", "hba1c"]
    text_en: |
      Perioperative glucose target:
      Target glucose in the perioperative period: 6-12 mmol/L. Preoperative HbA1c target: <8.5% (<69 mmol/mol). HbA1c screening within 3 months is recommended for all patients with diabetes. If HbA1c >8.5%, diabetology assessment is suggested.
  long_acting_insulin:
    aliases: ["long-acting insulin", "glargine", "lantus", "toujeo", "detemir", "levemir", "degludec", "tresiba"]
    text_en: |
      Long-acting insulin; glargine; Lantus; Toujeo; detemir; Levemir; degludec; Tresiba:
      Day before surgery: reduce dose by 20%. Day of surgery: reduce dose by 20%. Do not calculate the reduced dose.
  mixed_insulin:
    aliases: ["mixed insulin", "humalog mix", "isophane mix", "humulin m3", "insuman comb", "novomix"]
    text_en: |
      Mixed insulin; Humalog Mix; isophane mix; Humulin M3; Insuman Comb; Novomix:
      Day before surgery and day of surgery: morning half dose, noon omit, evening depends on eating.
  intermediate_acting_insulin:
    aliases: ["intermediate-acting insulin", "nph", "isophane", "humulin n", "insulotard", "insuman basal"]
    text_en: |
      Intermediate-acting insulin; NPH; isophane; Humulin N; Insulotard; Insuman Basal:
      Day before surgery and day of surgery: morning half dose, noon omit, evening depends on eating.
  rapid_acting_insulin:
    aliases: ["rapid-acting insulin", "short-acting insulin", "glulisine", "apidra", "aspart", "fiasp", "novorapid", "lispro", "humalog", "liprolog", "actrapid"]
    text_en: |
      Rapid-acting insulin; short-acting insulin; glulisine; Apidra; aspart; Fiasp; Novorapid; lispro; Humalog; Liprolog; Actrapid:
      Day before surgery: only with meals. Day of surgery: only with meals; omit if fasting.

  # --- antidiabetics ------------------------------------------------------ #
  sulfonylureas:
    aliases: ["sulfonylureas", "szulfonilureak", "glibenclamide", "gliclazide", "glimepiride"]
    text_en: |
      Sulfonylureas; szulfonilureak; glibenclamide; gliclazide; glimepiride:
      Day before surgery: take/continue. Morning of surgery: omit because of hypoglycemia risk.
  meglitinides:
    aliases: ["meglitinides", "meglitinidek", "repaglinide", "nateglinide"]
    text_en: |
      Meglitinides; meglitinidek; repaglinide; nateglinide:
      Day before surgery: take/continue. Morning of surgery: omit because of hypoglycemia risk.
  acarbose:
    aliases: ["acarbose", "akarbóz", "glucobay"]
    text_en: |
      Acarbose; akarbóz; Glucobay:
      Day before surgery: take/continue. Morning of surgery: omit because of hypoglycemia risk.
  sglt2_inhibitors:
    aliases: ["sglt2 inhibitors", "sglt-2 gatlok", "dapagliflozin", "empagliflozin", "ertugliflozin", "forxiga", "xigduo", "jardiance", "synjardy", "segluromet", "steglatro", "steglujan"]
    text_en: |
      SGLT2 inhibitors; SGLT-2 gatlok; dapagliflozin; empagliflozin; ertugliflozin; Forxiga; Xigduo; Jardiance; Synjardy; Segluromet; Steglatro; Steglujan:
      Omit 2 days before surgery and omit on the morning of surgery. Source note: euglycemic ketoacidosis may occur; risk factors include fluid shifts, reduced energy intake, and critical illness. If not omitted, source recommends monitoring, venous blood gas control, and early eating/drinking.
  dpp4_inhibitors:
    aliases: ["dpp4 inhibitors", "dpp-iv gatlok", "sitagliptin", "vildagliptin", "saxagliptin", "alogliptin", "linagliptin"]
    text_en: |
      DPP4 inhibitors; DPP-IV gatlok; sitagliptin; vildagliptin; saxagliptin; alogliptin; linagliptin:
      Day before surgery: take/continue. Morning of surgery: take/continue.
  glp1_analogues:
    aliases: ["glp1 analogues", "glp-1 analogok", "exenatide", "liraglutide", "lixisenatide"]
    text_en: |
      GLP1 analogues; GLP-1 analogok; exenatide; liraglutide; lixisenatide:
      Day before surgery: take/continue. Morning of surgery: take/continue.
  metformin:
    aliases: ["metformin"]
    text_en: |
      Metformin:
      If no lactic acidosis risk factors are present: day before surgery take/continue and morning of surgery take/continue. If any of the following are present, omit: GFR <60, iodinated contrast, high-risk surgery, critical illness, or organ failure.
  pioglitazone:
    aliases: ["pioglitazone", "pioglitazon", "actos"]
    text_en: |
      Pioglitazone; pioglitazon; Actos:
      Day before surgery: take/continue. Morning of surgery: take/continue.

  # --- antithrombotic context (overview) ---------------------------------- #
  antithrombotic_context:
    aliases: ["antithrombotic context", "antithrombotic overview", "antithrombotics general"]
    text_en: |
      This section covers perioperative omission timing for antiplatelet and anticoagulant drugs. Bridging instructions are intentionally omitted. Do not recommend bridging from this protocol.

      For low bleeding risk procedures, the source states not to omit the antithrombotic drug and no bridging is needed.

      For regional anesthesia: the source states high bleeding risk regional anesthesia requires antithrombotic omission; procedures not listed as high risk are low risk and can be punctured while anticoagulated.

      Do not calculate CHA2DS2-VASc, thromboembolic risk, bleeding risk, renal categories, or bridging. If timing depends on bleeding risk, neuraxial anesthesia, or renal function and the user did not provide it, return all available table choices for the named drug; do not ask for surgery type or bleeding-risk classification.

  # --- antiplatelet (complete entries) ------------------------------------ #
  aspirin:
    aliases: ["aspirin", "acetylsalicylic acid", "asa", "acetilszalicilsav", "acizalep", "asactal", "astrix", "kardegic"]
    text_en: |
      Aspirin; acetylsalicylic acid; ASA; acetilszalicilsav; Acizalep; Asactal; Astrix; Kardegic:
      Usually no need to omit.
      Omit only if high bleeding risk: spinal, intracranial, ophtalmic surgery, TURP
  clopidogrel:
    aliases: ["clopidogrel", "atrombin", "clopidep", "egitromb", "kardogrel"]
    text_en: |
      Clopidogrel; Atrombin; Clopidep; Egitromb; Kardogrel:
      Some surgeries do not need omission e.g. vascular and acute procedures, consult surgeon if in doubt.
      Omit 5 days before surgery, spinal/epidural anesthesia.

      If no coronary stent -> omit
      If coronary stent and older than 3 months/12 weeks -> omit
      Coronary stent 6-12 week old -> interventional cardiologist and surgeon to decide
      coronary stent less than 5 week old -> do not omit, unless expert consult

      Epidural catheter: forbidden.
      After puncture or epidural catheter removal: 6 hours if loading dose.
  ticlopidine:
    aliases: ["ticlopidine", "ticlopidin", "aclotin", "ipaton", "ticlid"]
    text_en: |
      Ticlopidine; ticlopidin; Aclotin; Ipaton; Ticlid:
      Omit 10 days before surgery. Omit 10 days before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours if loading dose.

      If no coronary stent -> omit
      If coronary stent and older than 3 months/12 weeks -> omit
      Coronary stent 6-12 week old -> interventional cardiologist and surgeon to decide
      coronary stent less than 5 week old -> do not omit, unless expert consult
  prasugrel:
    aliases: ["prasugrel", "efient"]
    text_en: |
      Prasugrel; Efient:
      Omit 7 days before surgery. Omit 7 days before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours if loading dose.

      If no coronary stent -> omit
      If coronary stent and older than 3 months/12 weeks -> omit
      Coronary stent 6-12 week old -> interventional cardiologist and surgeon to decide
      coronary stent less than 5 week old -> do not omit, unless expert consult
  ticagrelor:
    aliases: ["ticagrelor", "brilique"]
    text_en: |
      Ticagrelor; Brilique:
      Source conflict: the overview table says omit 5 days before surgery, while the detailed antiplatelet table says omit 3 days before surgery and 5 days before spinal/epidural anesthesia. Do not give a definitive single timing without local review. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours if loading dose.

      If no coronary stent -> omit
      If coronary stent and older than 3 months/12 weeks -> omit
      Coronary stent 6-12 week old -> interventional cardiologist and surgeon to decide
      coronary stent less than 5 week old -> do not omit, unless expert consult
  cangrelor:
    aliases: ["cangrelor", "kengreal"]
    text_en: |
      Cangrelor; Kengreal:
      Omit 3 hours before surgery. Omit 3 hours before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 8 hours.
  abciximab:
    aliases: ["abciximab", "reopro"]
    text_en: |
      Abciximab; ReoPro:
      Omit 24 hours before surgery. Omit 48 hours before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 48 hours.
  tirofiban:
    aliases: ["tirofiban", "aggrastat"]
    text_en: |
      Tirofiban; Aggrastat:
      Omit 8 hours before surgery. Omit 8 hours before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 8 hours.
  eptifibatide:
    aliases: ["eptifibatide", "integrilin"]
    text_en: |
      Eptifibatide; Integrilin:
      Omit 4 hours before surgery. Omit 8 hours before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 8 hours.
  triflusal_group:
    aliases: ["triflusal", "cilostazol", "dipyridamole", "dipirydamol", "selexipag"]
    text_en: |
      Triflusal; cilostazol; dipyridamole; dipirydamol; selexipag:
      Omit in high bleeding risk surgery; detailed table gives 2 days. Omit 2 days before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours.

  # --- anticoagulants (complete entries) ---------------------------------- #
  dabigatran:
    aliases: ["dabigatran", "pradaxa"]
    text_en: |
      Dabigatran; Pradaxa:
      Low bleeding risk surgery: omit 1 day if GFR >=50, omit 2 days if GFR <50. High bleeding risk or spinal/epidural anesthesia: omit 2 days if GFR >=50, omit 4 days if GFR <50. Epidural catheter: forbidden. After puncture or catheter removal: 2 hours.
  apixaban:
    aliases: ["apixaban", "eliquis"]
    text_en: |
      Apixaban; Eliquis:
      Low bleeding risk surgery: omit 24 hours. High bleeding risk or spinal/epidural anesthesia: omit 2 days. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours.
  edoxaban:
    aliases: ["edoxaban", "lixiana"]
    text_en: |
      Edoxaban; Lixiana:
      Low bleeding risk surgery: omit 24 hours. High bleeding risk or spinal/epidural anesthesia: omit 2 days. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours.
  rivaroxaban:
    aliases: ["rivaroxaban", "xarelto"]
    text_en: |
      Rivaroxaban; Xarelto:
      Low bleeding risk surgery: omit 24 hours. High bleeding risk or spinal/epidural anesthesia: omit 2 days. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours.
  fondaparinux:
    aliases: ["fondaparinux", "arixtra"]
    text_en: |
      Fondaparinux; Arixtra:
      Low bleeding risk surgery: omit 1 day if GFR >=30, omit 2 days if GFR <30. High bleeding risk or spinal/epidural anesthesia: omit 2 days if GFR >=30, omit 3 days if GFR <30. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours for prophylaxis, 72 hours for therapeutic dosing.
  argatroban:
    aliases: ["argatroban", "acova"]
    text_en: |
      Argatroban; Acova:
      Omit 4 hours before surgery or until APTI is normal. Spinal/epidural anesthesia: forbidden in the source table. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours.
  lepirudin:
    aliases: ["lepirudin", "refludan"]
    text_en: |
      Lepirudin; Refludan:
      Omit 72 hours before surgery or until APTI is normal. Spinal/epidural anesthesia: forbidden in the source table. Epidural catheter: forbidden. After puncture or catheter removal: 2 hours.
  bivalirudin:
    aliases: ["bivalirudin"]
    text_en: |
      Bivalirudin:
      Omit 10 hours before surgery or until APTI is normal. Spinal/epidural anesthesia: forbidden in the source table. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours.
  alteplase:
    aliases: ["alteplase", "actilyse"]
    text_en: |
      Alteplase; Actilyse:
      Omit 10 days before surgery. Omit 10 days before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 10 days.
  acenocoumarol:
    aliases: ["acenocoumarol", "syncumar"]
    text_en: |
      Acenocoumarol; Syncumar:
      Omit/adjust until INR <1.5 before surgery and before spinal/epidural anesthesia. Overview table also says check INR and indicates about 2 days. Epidural catheter: forbidden. After puncture or catheter removal: 2 hours. Bridging is intentionally omitted.
  warfarin:
    aliases: ["warfarin", "marfarin"]
    text_en: |
      Warfarin; Marfarin:
      Omit/adjust until INR <1.5 before surgery and before spinal/epidural anesthesia. Overview table also indicates 5 days. Epidural catheter: forbidden. After puncture or catheter removal: 2 hours. Bridging is intentionally omitted.
  prophylactic_sc_heparin:
    aliases: ["prophylactic subcutaneous heparin", "profilaktikus heparin"]
    text_en: |
      Prophylactic subcutaneous heparin; profilaktikus heparin:
      Omit 4 hours before surgery or until APTI is normal. Omit 4 hours before spinal/epidural anesthesia or until APTI is normal. Epidural catheter: allowed. After puncture or catheter removal: 1 hour.
  therapeutic_iv_heparin:
    aliases: ["therapeutic intravenous heparin", "terapias iv heparin"]
    text_en: |
      Therapeutic intravenous heparin; terapias iv heparin:
      Source table indicates catheter forbidden and 4 hours after puncture/catheter removal; use local review for complete timing because the extracted row is abbreviated.
  prophylactic_lmwh:
    aliases: ["prophylactic lmwh", "prophylactic low molecular weight heparin", "profilaktikus lmwh", "enoxaparin", "clexane", "dalteparin", "fragmin", "nadroparin", "fraxiparin"]
    text_en: |
      Prophylactic LMWH; prophylactic low molecular weight heparin; profilaktikus LMWH; enoxaparin; Clexane; dalteparin; Fragmin; nadroparin; Fraxiparin:
      Omit 12 hours before surgery. Omit 12 hours before spinal/epidural anesthesia. Epidural catheter: allowed. After puncture or catheter removal: 2 hours. Overview note: do not give the morning dose on surgery day; after surgery it may be given depending on bleeding risk.
  therapeutic_lmwh:
    aliases: ["therapeutic lmwh", "therapeutic low molecular weight heparin", "terapias lmwh"]
    text_en: |
      Therapeutic LMWH; therapeutic low molecular weight heparin; terapias LMWH:
      Omit 24 hours before surgery. Omit 24 hours before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 4 hours.
  sulodexide:
    aliases: ["sulodexide", "vessel due"]
    text_en: |
      Sulodexide; Vessel Due:
      Omit 24 hours before surgery. Omit 5 days before spinal/epidural anesthesia. Epidural catheter: forbidden. After puncture or catheter removal: 6 hours.
